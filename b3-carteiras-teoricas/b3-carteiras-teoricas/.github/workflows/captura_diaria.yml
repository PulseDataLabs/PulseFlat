name: Captura Diária B3 Carteiras Teóricas

on:
  schedule:
    # 09:30 horário de Brasília (BRT = UTC-3) → 12:30 UTC
    # Roda apenas em dias úteis (seg-sex)
    - cron: "30 12 * * 1-5"

  workflow_dispatch:   # permite rodar manualmente pelo GitHub

jobs:
  capturar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar captura (todos os índices)
        run: python b3_carteiras.py

      - name: Commit e push do CSV atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/b3_carteiras_teoricas.csv
          git diff --cached --quiet || git commit -m "chore: atualiza carteiras teóricas B3 $(date +'%Y-%m-%d %H:%M BRT')"
          git push
